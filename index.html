<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
        <title>Login</title>
    </head>

    <body>
        <!-- container principal -->
        <div class="container">
            <!-- singup - cadastro -->
            <div class="content first-content">
                <div class="first-column">
                    <h2 class="title title-primary">Bem vindo!</h2>
                    <p class="description description-primary">Para permanecer conectado conosco por favor</p>
                    <p class="description description-primary">efetue o login com suas informações pessoais</p>
                    <button class="button button-primary" id="singIn">Acessar</button>
                </div>

                <div class="second-column">
                    <h2 class="title title-second">
                        Crie sua conta
                    </h2>

                    <div class="social-media">
                        <ul class="list-social-media">
                            <a class="link-social-media" href="#">
                                <li class="item-social-media">
                                    <i class="fab fa-facebook"></i>
                                </li>
                            </a>
                            <a class="link-social-media" href="#">
                                <li class="item-social-media">
                                    <i class="fab fa-google"></i>
                                </li>
                            </a>
                            <a class="link-social-media" href="#">
                                <li class="item-social-media">
                                    <i class="fab fa-linkedin"></i>
                                </li>
                            </a>
                        </ul>                        
                    </div>

                    <p class="description description-second">
                        ou cadastre-se:
                    </p>

                    <form class="form">
                        <label class="label label-input" for="">
                            <i class="fas fa-user icons"></i>
                            <input type="text" placeholder="Nome">
                        </label>

                        <label class="label label-input" for="">
                            <i class="fas fa-envelope icons"></i>
                            <input type="email" placeholder="E-mail">
                        </label>

                        <label class="label label-input" for="">
                            <i class="fas fa-lock icons"></i>
                            <input type="password" placeholder="Password">
                        </label>
                        <button class="button button-second">Cadastrar</button>
                    </form>
                </div>
            </div>

            <!-- singin - acessar -->
            <div class="content second-content">
                <div class="first-column">
                    <h2 class="title title-primary">Olá, bem vindo</h2>
                    <p class="description description-primary">
                        Faça o seu cadastro
                    </p>

                    <p class="description description-primary">
                        e começe a sua jornada conosco
                    </p>
                    <button id="singUp" class="button button-primary">
                        Cadastre-se
                    </button>
                </div>

                <div class="second-column">
                    <h2 class="title title-second">Acesse com a sua conta</h2>

                    <div class="social-media">
                        <ul class="list-social-media">
                            <a class="link-social-media" href="#">
                                <li class="item-social-media">
                                    <i class="fab fa-facebook"></i>
                                </li>
                            </a>
                            <a class="link-social-media" href="#">
                                <li class="item-social-media">
                                    <i class="fab fa-google"></i>
                                </li>
                            </a>
                            <a class="link-social-media" href="#">
                                <li class="item-social-media">
                                    <i class="fab fa-linkedin"></i>
                                </li>
                            </a>
                        </ul>                        
                    </div>

                    <p class="description description-second">
                        ou utilize seu e-mail e senha:
                    </p>

                    <form class="form" action="">
                        <label class="label label-input">
                            <i class="fas fa-envelope icons"></i>
                            <input id="emailLogin" 
                                type="email" 
                                placeholder="E-mail">
                        </label>

                        <label>
                            <i class="fas fa-lock icons"></i>
                            <input id="senhaLogin" 
                                type="password"
                                placeholder="Senha">
                        </label>

                        <a href="#" class="description description-second">
                            Esqueceu sua senha?
                        </a>

                        <button id="access" class="button button-second">
                            Acessar
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <script src="js/login.js"></script>
    </body>
</html>
